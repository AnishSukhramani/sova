services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  web:
    build: .
    command: gunicorn sova.wsgi:application --bind 0.0.0.0:8000 --workers 4
    env_file: .env
    ports:
      - "8000:8000"
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - .:/app
    restart: unless-stopped

  celery-worker-collectors:
    build: .
    command: celery -A sova worker -l info -Q collectors,default -c 8 --prefetch-multiplier 1
    env_file: .env
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - .:/app
    restart: unless-stopped

  celery-worker-tools:
    build: .
    command: celery -A sova worker -l info -Q tools,llm -c 4 --prefetch-multiplier 1
    env_file: .env
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - .:/app
    restart: unless-stopped

  celery-beat:
    build: .
    command: celery -A sova beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file: .env
    depends_on:
      db: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes:
      - .:/app
    restart: unless-stopped

  flower:
    build: .
    command: celery -A sova flower --port=5555
    env_file: .env
    ports:
      - "5555:5555"
    depends_on:
      redis: {condition: service_healthy}
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
